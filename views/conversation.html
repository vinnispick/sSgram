<!-- Conversation partial — loaded via hx-get="/chat/:id" -->

<!-- Chat header -->
<div class="flex-shrink-0 bg-dark-800/80 backdrop-blur-lg border-b border-dark-600 px-4 py-3">
    <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-dark-600 flex items-center justify-center text-gray-300 font-semibold text-sm">
            {{slice .PartnerName 0 1}}
        </div>
        <div>
            <h2 class="text-white font-semibold text-sm">{{.PartnerName}}</h2>
            <p class="text-gray-500 text-xs">private chat</p>
        </div>
    </div>
</div>

<!-- Messages -->
<div id="messages-wrapper" class="flex-1 overflow-y-auto scroll-smooth px-4 py-4">
    <div id="messages" class="max-w-3xl mx-auto space-y-2">
        {{range .Messages}}
        <div class="flex {{if eq .SenderID $.UserID}}flex-row-reverse{{else}}flex-row{{end}} animate-in">
            <div class="{{if eq .SenderID $.UserID}}message-mine{{else}}message-theirs{{end}}">
                <div class="message-header">
                    <span class="message-username">{{.Sender.Username}}</span>
                    <span class="message-time">{{.CreatedAt.Format "15:04"}}</span>
                </div>
                <div class="message-content">
                    {{if .ImageUrl}}
                    <img src="{{.ImageUrl}}" class="max-w-xs rounded-lg shadow-md my-2 object-contain"/>
                    {{end}}
                    {{if .AudioUrl}}
                    <audio controls src="{{.AudioUrl}}" class="max-w-xs my-2"></audio>
                    {{end}}
                    {{if .Content}}
                    {{if or .ImageUrl .AudioUrl}}<br>{{end}}{{.Content}}
                    {{end}}
                </div>
            </div>
        </div>
        {{end}}
    </div>
</div>

<!-- Input area -->
<div class="flex-shrink-0 bg-dark-800/80 backdrop-blur-lg border-t border-dark-600 px-4 py-3">
    <form id="send-form"
          hx-post="/send"
          hx-target="#messages"
          hx-swap="beforeend"
          hx-on::after-request="this.reset(); document.getElementById('msg-input').focus();"
          class="max-w-3xl mx-auto flex gap-3 items-center">
        <input type="hidden" name="receiver_id" value="{{.PartnerID}}" />
        <label class="flex items-center justify-center cursor-pointer text-gray-400 hover:text-white transition-colors px-3 py-3 bg-dark-700 rounded-xl hover:bg-dark-600 shadow-sm" title="Upload Image">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path>
            </svg>
            <input type="file" name="image" class="hidden" hx-post="/upload" hx-trigger="change" hx-target="#messages" hx-swap="beforeend" hx-encoding="multipart/form-data" hx-include="[name='receiver_id']" hx-on::after-request="this.value=''">
        </label>
        <button type="button" id="record-btn" class="flex items-center justify-center cursor-pointer text-gray-400 hover:text-red-500 transition-colors px-3 py-3 bg-dark-700 rounded-xl hover:bg-dark-600 shadow-sm" title="Record Voice">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
            </svg>
        </button>
        <input
                type="text"
                id="msg-input"
                name="content"
                autocomplete="off"
                placeholder="Write a message..."
                class="flex-1 px-4 py-3 bg-dark-700 border border-dark-600 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition-all duration-200"
            />
            <button
                type="submit"
                id="send-btn"
                class="px-5 py-3 bg-gradient-to-r from-accent-500 to-teal-500 hover:from-accent-600 hover:to-teal-400 text-white font-semibold rounded-xl shadow-lg shadow-accent-500/25 hover:shadow-accent-500/40 transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
    </form>
</div>

<script>
    // Auto-scroll to bottom
    const wrapper = document.getElementById('messages-wrapper');
    const messages = document.getElementById('messages');

    function scrollToBottom() {
        wrapper.scrollTop = wrapper.scrollHeight;
    }
    scrollToBottom();

    const observer = new MutationObserver(() => {
        requestAnimationFrame(scrollToBottom);
    });
    observer.observe(messages, { childList: true });

    // Enter key handler
    document.getElementById('msg-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            document.getElementById('send-form').requestSubmit();
        }
    });

    // Focus input
    document.getElementById('msg-input').focus();

    // Voice Recording Logic
    let mediaRecorder;
    let audioChunks = [];
    const recordBtn = document.getElementById('record-btn');
    const receiverId = document.querySelector('input[name="receiver_id"]').value;
    let isRecording = false;

    recordBtn.addEventListener('click', async () => {
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.addEventListener("dataavailable", event => {
                    audioChunks.push(event.data);
                });

                mediaRecorder.addEventListener("stop", () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const formData = new FormData();
                    formData.append("audio", audioBlob, "voice.webm");
                    formData.append("receiver_id", receiverId);

                    // Send to backend via fetch
                    fetch('/upload-audio', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.text())
                    .then(html => {
                        // Append the sender's HTML returned from the server to avoid WebSocket echo issues
                        const messagesDiv = document.getElementById('messages');
                        messagesDiv.insertAdjacentHTML('beforeend', html);
                        
                        // Process HTMX elements in new HTML if any (needed for standard HTMX behavior)
                        htmx.process(messagesDiv);
                        scrollToBottom();
                    })
                    .catch(error => {
                        console.error("Audio upload failed:", error);
                    });
                    
                    // Release tracks
                    stream.getTracks().forEach(track => track.stop());
                });

                mediaRecorder.start();
                isRecording = true;
                recordBtn.classList.remove('text-gray-400');
                recordBtn.classList.add('text-red-500', 'animate-pulse');
            } catch(e) {
                console.error("Microphone access denied or error:", e);
                alert("Could not access microphone");
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.classList.add('text-gray-400');
            recordBtn.classList.remove('text-red-500', 'animate-pulse');
        }
    });
</script>
