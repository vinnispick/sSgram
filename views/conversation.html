<!-- Conversation partial — loaded via hx-get="/chat/:id" -->

<!-- Chat header -->
<div class="flex-shrink-0 bg-dark-800/80 backdrop-blur-lg border-b border-dark-600 px-4 py-3">
    <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-dark-600 flex items-center justify-center text-gray-300 font-semibold text-sm">
            {{slice .PartnerName 0 1}}
        </div>
        <div>
            <h2 class="text-white font-semibold text-sm">{{.PartnerName}}</h2>
            <p class="text-gray-500 text-xs">private chat</p>
        </div>
    </div>
</div>

<!-- Messages -->
<div id="messages-wrapper" class="flex-1 overflow-y-auto scroll-smooth px-4 py-4">
    <div id="messages" class="max-w-3xl mx-auto space-y-2">
        {{range .Messages}}
        <div class="flex {{if eq .SenderID $.UserID}}justify-end{{else}}justify-start{{end}} animate-in">
            <div class="{{if eq .SenderID $.UserID}}message-mine{{else}}message-theirs{{end}}">
                <div class="message-header">
                    <span class="message-username">{{.Sender.Username}}</span>
                    <span class="message-time">{{.CreatedAt.Format "15:04"}}</span>
                </div>
                <div class="message-content">{{.Content}}</div>
            </div>
        </div>
        {{end}}
    </div>
</div>

<!-- Input area -->
<div class="flex-shrink-0 bg-dark-800/80 backdrop-blur-lg border-t border-dark-600 px-4 py-3">
    <form id="send-form"
          hx-post="/send"
          hx-swap="none"
          hx-on::after-request="this.reset(); document.getElementById('msg-input').focus();"
          class="max-w-3xl mx-auto flex gap-3">
        <input type="hidden" name="receiver_id" value="{{.PartnerID}}" />
        <input
            type="text"
            id="msg-input"
            name="content"
            required
            autocomplete="off"
            placeholder="Write a message..."
            class="flex-1 px-4 py-3 bg-dark-700 border border-dark-600 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition-all duration-200"
        />
        <button
            type="submit"
            id="send-btn"
            class="px-5 py-3 bg-gradient-to-r from-accent-500 to-teal-500 hover:from-accent-600 hover:to-teal-400 text-white font-semibold rounded-xl shadow-lg shadow-accent-500/25 hover:shadow-accent-500/40 transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]"
        >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
        </button>
    </form>
</div>

<script>
    // Auto-scroll to bottom
    const wrapper = document.getElementById('messages-wrapper');
    const messages = document.getElementById('messages');

    function scrollToBottom() {
        wrapper.scrollTop = wrapper.scrollHeight;
    }
    scrollToBottom();

    const observer = new MutationObserver(() => {
        requestAnimationFrame(scrollToBottom);
    });
    observer.observe(messages, { childList: true });

    // Enter key handler
    document.getElementById('msg-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            document.getElementById('send-form').requestSubmit();
        }
    });

    // Focus input
    document.getElementById('msg-input').focus();
</script>
