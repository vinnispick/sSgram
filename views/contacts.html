{{if .Contacts}}
{{range .Contacts}}
<button class="contact-item w-full text-left px-4 py-3 flex items-center gap-3 hover:bg-dark-700 transition-colors border-b border-dark-600/30"
        data-username="{{.Username}}"
        data-contact-id="{{.ID}}"
        hx-get="/chat/{{.ID}}"
        hx-target="#chat-area"
        hx-swap="innerHTML"
        onclick="setActiveContact(this, {{.ID}}, '{{.Username}}')">
    <div class="relative">
        <div class="w-10 h-10 rounded-full bg-dark-600 flex items-center justify-center text-gray-300 font-semibold text-sm">
            {{slice .Username 0 1}}
        </div>
        {{if .Online}}
        <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-400 rounded-full border-2 border-dark-800"></div>
        {{end}}
    </div>
    <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between">
            <span class="text-white text-sm font-medium truncate">{{.Username}}</span>
            {{if .UnreadCount}}
            <span class="bg-red-500 text-[10px] font-bold text-white rounded-full h-5 min-w-[20px] flex items-center justify-center px-1 animate-pulse shadow-lg shadow-red-500/20">
                {{.UnreadCount}}
            </span>
            {{end}}
        </div>
        <span class="text-gray-500 text-xs">{{if .Online}}online{{else}}offline{{end}}</span>
    </div>
</button>
{{end}}
{{else}}
<div class="p-6 text-center text-gray-500 text-sm">
    No other users yet.<br/>
    <span class="text-gray-600 text-xs">Ask someone to join!</span>
</div>
{{end}}
