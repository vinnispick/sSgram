<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Antigram — Chat</title>

    <!-- PWA Meta -->
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Antigram" />
    <link rel="apple-touch-icon" href="/public/icons/icon-192.png" />
    <link rel="manifest" href="/public/manifest.json" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0d1117', 800: '#161b22', 700: '#21262d', 600: '#30363d' },
                        accent: { 400: '#58a6ff', 500: '#1f6feb', 600: '#1158c7' },
                        teal: { 400: '#2dd4bf', 500: '#14b8a6' }
                    }
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/ws.js"></script>

    <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body class="bg-dark-900 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="flex-shrink-0 bg-dark-800/80 backdrop-blur-lg border-b border-dark-600 px-4 py-3 safe-area-top">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-accent-500 to-teal-500 flex items-center justify-center shadow-md">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-white font-semibold text-lg leading-tight">Antigram</h1>
                    <p class="text-gray-400 text-xs">Global Chat</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm text-gray-400 hidden sm:block">
                    <span class="inline-block w-2 h-2 rounded-full bg-emerald-400 mr-1 animate-pulse"></span>
                    {{.Username}}
                </span>
                <form action="/logout" method="POST">
                    <button type="submit" id="logout-btn"
                            class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-dark-700 transition-colors"
                            title="Logout">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </header>

    <!-- Chat area with WebSocket -->
    <div hx-ext="ws" ws-connect="/ws" class="flex-1 flex flex-col min-h-0">

        <!-- Messages container -->
        <div id="messages-wrapper" class="flex-1 overflow-y-auto scroll-smooth px-4 py-4">
            <div id="messages" class="max-w-3xl mx-auto space-y-1">
                {{range .Messages}}
                <div class="message-bubble animate-in">
                    <div class="message-header">
                        <span class="message-username">{{.Username}}</span>
                        <span class="message-time">{{.CreatedAt.Format "15:04"}}</span>
                    </div>
                    <div class="message-content">{{.Content}}</div>
                </div>
                {{end}}
            </div>
        </div>

        <!-- Input area -->
        <div class="flex-shrink-0 bg-dark-800/80 backdrop-blur-lg border-t border-dark-600 px-4 py-3 safe-area-bottom">
            <form id="send-form"
                  hx-post="/send"
                  hx-swap="none"
                  hx-on::after-request="this.reset(); document.getElementById('msg-input').focus();"
                  class="max-w-3xl mx-auto flex gap-3">
                <input
                    type="text"
                    id="msg-input"
                    name="content"
                    required
                    autocomplete="off"
                    placeholder="Write a message..."
                    class="flex-1 px-4 py-3 bg-dark-700 border border-dark-600 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-500 focus:border-transparent transition-all duration-200"
                />
                <button
                    type="submit"
                    id="send-btn"
                    class="px-5 py-3 bg-gradient-to-r from-accent-500 to-teal-500 hover:from-accent-600 hover:to-teal-400 text-white font-semibold rounded-xl shadow-lg shadow-accent-500/25 hover:shadow-accent-500/40 transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Auto-scroll to bottom on new messages
        const wrapper = document.getElementById('messages-wrapper');
        const messages = document.getElementById('messages');

        function scrollToBottom() {
            wrapper.scrollTop = wrapper.scrollHeight;
        }

        // Scroll on page load
        scrollToBottom();

        // Observe new messages via MutationObserver
        const observer = new MutationObserver(() => {
            requestAnimationFrame(scrollToBottom);
        });
        observer.observe(messages, { childList: true });

        // Handle Enter key
        document.getElementById('msg-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('send-form').requestSubmit();
            }
        });

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/public/service-worker.js');
        }
    </script>
</body>
</html>
