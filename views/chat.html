<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Antigram — Chat</title>

    <!-- PWA Meta -->
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Antigram" />
    <link rel="apple-touch-icon" href="/public/icons/icon-192.png" />
    <link rel="manifest" href="/public/manifest.json" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0d1117', 800: '#161b22', 700: '#21262d', 600: '#30363d', 500: '#484f58' },
                        accent: { 400: '#58a6ff', 500: '#1f6feb', 600: '#1158c7' },
                        teal: { 400: '#2dd4bf', 500: '#14b8a6' }
                    }
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/ws.js"></script>

    <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body class="bg-dark-900 h-screen flex overflow-hidden" hx-ext="ws" ws-connect="/ws">

    <!-- ===== LEFT SIDEBAR ===== -->
    <aside id="sidebar" class="w-80 flex-shrink-0 bg-dark-800 border-r border-dark-600 flex flex-col h-screen">

        <!-- Sidebar header -->
        <div class="flex-shrink-0 p-4 border-b border-dark-600">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-500 to-teal-500 flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                        </svg>
                    </div>
                    <span class="text-white font-semibold text-lg">Antigram</span>
                </div>
                <form action="/logout" method="POST">
                    <button type="submit" id="logout-btn"
                            class="text-gray-400 hover:text-white p-1.5 rounded-lg hover:bg-dark-700 transition-colors" title="Logout">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </button>
                </form>
            </div>

            <!-- Search -->
            <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" id="contact-search" placeholder="Search contacts..."
                       class="w-full pl-9 pr-3 py-2 bg-dark-700 border border-dark-600 rounded-lg text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-accent-500 transition-all" />
            </div>
        </div>

        <!-- Current user -->
        <div class="flex-shrink-0 px-4 py-2 border-b border-dark-600/50">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-accent-500 to-teal-500 flex items-center justify-center text-white text-xs font-bold">
                    {{slice .Username 0 1}}
                </div>
                <div>
                    <span class="text-white text-sm font-medium">{{.Username}}</span>
                    <span class="text-emerald-400 text-xs block">online</span>
                </div>
            </div>
        </div>

        <!-- Contact list -->
        <div id="contact-list" class="flex-1 overflow-y-auto">
            {{if .Contacts}}
            {{range .Contacts}}
            <button class="contact-item w-full text-left px-4 py-3 flex items-center gap-3 hover:bg-dark-700 transition-colors border-b border-dark-600/30"
                    data-username="{{.Username}}"
                    data-contact-id="{{.ID}}"
                    hx-get="/chat/{{.ID}}"
                    hx-target="#chat-area"
                    hx-swap="innerHTML"
                    onclick="setActiveContact(this, {{.ID}}, '{{.Username}}')">
                <div class="relative">
                    <div class="w-10 h-10 rounded-full bg-dark-600 flex items-center justify-center text-gray-300 font-semibold text-sm">
                        {{slice .Username 0 1}}
                    </div>
                    {{if .Online}}
                    <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-400 rounded-full border-2 border-dark-800"></div>
                    {{end}}
                </div>
                <div class="flex-1 min-w-0">
                    <span class="text-white text-sm font-medium truncate block">{{.Username}}</span>
                    <span class="text-gray-500 text-xs">{{if .Online}}online{{else}}offline{{end}}</span>
                </div>
            </button>
            {{end}}
            {{else}}
            <div class="p-6 text-center text-gray-500 text-sm">
                No other users yet.<br/>
                <span class="text-gray-600 text-xs">Ask someone to join!</span>
            </div>
            {{end}}
        </div>
    </aside>

    <!-- ===== MAIN CHAT AREA ===== -->
    <main class="flex-1 flex flex-col h-screen min-w-0">
        <div id="chat-area" class="flex-1 flex flex-col min-h-0">
            <!-- Empty state -->
            <div class="flex-1 flex items-center justify-center">
                <div class="text-center">
                    <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-dark-700 flex items-center justify-center">
                        <svg class="w-10 h-10 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                  d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                        </svg>
                    </div>
                    <h2 class="text-gray-400 text-lg font-medium mb-1">Select a contact</h2>
                    <p class="text-gray-600 text-sm">Choose someone from the sidebar to start chatting</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let activeContactId = null;

        // Set active contact
        function setActiveContact(el, contactId, contactName) {
            activeContactId = contactId;
            // Highlight active
            document.querySelectorAll('.contact-item').forEach(c => c.classList.remove('contact-active'));
            el.classList.add('contact-active');
        }

        // Contact search filter
        document.getElementById('contact-search').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.contact-item').forEach(item => {
                const name = item.dataset.username.toLowerCase();
                item.style.display = name.includes(query) ? '' : 'none';
            });
        });

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/public/service-worker.js');
        }
    </script>
</body>
</html>
