services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=antigram
      - DB_PASSWORD=antigram_secret
      - DB_NAME=antigram
      - APP_PORT=3000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=antigram
      - POSTGRES_PASSWORD=antigram_secret
      - POSTGRES_DB=antigram
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antigram"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
